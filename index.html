<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dino Logic Games</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 512px;
      height: 256px;
      object-fit: contain;
      margin-bottom: 32px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0px;
      color: #111111;
      user-select: none;
    }

    .logic {
      color: #2C8DEB;
    }

    @media (max-width: 768px) {
      .logo {
        width: 240px;
        height: 240px;
      }

      .title {
        font-size: 28px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <img
      src="logo.png"
      alt="Dino Logic Games Logo"
      class="logo"
    >

    <div class="title">
      DINO <span class="logic">LOGIC</span> GAMES
    </div>
  </div>

</body>
</html>
