<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dino Logic Games</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo {
      width: 240px;
      max-width: 70vw;
      margin-bottom: 30px;
    }

    .title {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 6px;
      color: white;
    }

    .logic {
      color: #5FA5D4;
    }

    @media (max-width: 768px) {
      .logo {
        width: 180px;
      }

      .title {
        font-size: 28px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="logo.png" alt="Dino Logic Games Logo" class="logo">

    <div class="title">
      DINO <span class="logic">LOGIC</span> GAMES
    </div>
  </div>

</body>
</html>
